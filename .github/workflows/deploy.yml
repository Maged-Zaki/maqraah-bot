name: Deploy to Remote Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: maqraah-bot
  DEPLOY_PATH: /home/ubuntu/app
  USER: ubuntu

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build and test
        run: npm test

      - name: Assemble runtime package
        run: |
          set -Eeuo pipefail

          mkdir -p deploy-package
          cp -R dist deploy-package/
          cp package.json package-lock.json newrelic.js deploy-package/

          find deploy-package/dist -name "*.test.js" -delete
          test -f deploy-package/dist/index.js

      - name: Upload runtime package
        uses: actions/upload-artifact@v7
        with:
          name: runtime-package
          path: deploy-package/
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Download runtime package
        uses: actions/download-artifact@v8
        with:
          name: runtime-package
          path: deploy-package

      - name: Configure SSH
        run: |
          set -Eeuo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          cat > ~/.ssh/config << SSH_CONFIG
          Host deploy-target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ env.USER }}
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Prepare remote directory
        run: |
          set -Eeuo pipefail

          ssh deploy-target 'mkdir -p "${{ env.DEPLOY_PATH }}"'

      - name: Copy runtime files to remote server
        working-directory: deploy-package
        run: |
          set -Eeuo pipefail

          rsync -avz --delete \
            --exclude=".env" \
            --exclude="*.db" \
            --exclude="*.sqlite" \
            --exclude="*.sqlite3" \
            -e ssh ./ \
            deploy-target:${{ env.DEPLOY_PATH }}/

      - name: Finalize deployment on server
        run: |
          set -Eeuo pipefail

          ssh deploy-target << 'EOF'
            set -Eeuo pipefail

            app_name='${{ env.APP_NAME }}'
            database_path='${{ vars.DATABASE_PATH }}'
            deploy_path='${{ env.DEPLOY_PATH }}'

            case "$database_path" in
              /*) resolved_database_path="$database_path" ;;
              *) resolved_database_path="$deploy_path/$database_path" ;;
            esac

            database_dir="$(dirname "$resolved_database_path")"
            mkdir -p "$database_dir"
            touch "$resolved_database_path"
            chmod 700 "$database_dir"

            cd "$deploy_path"

            cat > .env << 'ENV_FILE'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          GUILD_ID=${{ secrets.GUILD_ID }}
          CHANNEL_ID=${{ secrets.CHANNEL_ID }}
          DATABASE_PATH=${{ vars.DATABASE_PATH }}
          NEW_RELIC_LICENSE_KEY=${{ secrets.NEW_RELIC_LICENSE_KEY }}
          ENV_FILE
            chmod 600 .env

            # install production dependencies for the target machine
            npm ci --omit=dev --no-audit --no-fund

            # start or restart with PM2
            if pm2 describe "$app_name" > /dev/null; then
              pm2 restart "$app_name" --update-env
            else
              pm2 start dist/index.js --name "$app_name" --update-env
            fi
          EOF
